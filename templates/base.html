<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Brick ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/dashboard/">Brick ERP</a>
    <div>
      <a class="btn btn-sm btn-outline-light" href="/production/">Production</a>
      <a class="btn btn-sm btn-outline-light" href="/salary/ledger">Salary</a>
      <form class="d-inline" action="/auth/logout" method="post">
        <button class="btn btn-sm btn-warning">Logout</button>
      </form>
    </div>
  </div>
</nav>
<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{category}}">{{message}}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
