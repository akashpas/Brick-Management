{% extends "base.html" %}
{% block content %}
<h3>Production</h3>
<form class="row g-2 mb-3" method="post" action="/production/">
  <div class="col-md-3">
    <label class="form-label">Date</label>
    <input type="date" name="prod_date" class="form-control" value="{{ (cycler.now() if cycler else None) }}">
  </div>
  <div class="col-md-3">
    <label class="form-label">Brick Type</label>
    <select name="brick_item_id" class="form-select" required>
      {% for i in items %}
      <option value="{{ i.id }}">{{ i.name }} (₹{{ "%.2f"|format(i.rate_per_brick) }})</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-3">
    <label class="form-label">Worker</label>
    <select name="employee_id" class="form-select" required>
      {% for w in workers %}
      <option value="{{ w.id }}">{{ w.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-2">
    <label class="form-label">Quantity</label>
    <input type="number" min="1" name="quantity" class="form-control" required>
  </div>
  <div class="col-md-1 d-flex align-items-end">
    <button class="btn btn-primary w-100">Add</button>
  </div>
</form>

<div class="mb-2">
  <a class="btn btn-sm btn-outline-secondary" href="/production/export.csv">Export CSV</a>
</div>

<table class="table table-sm table-bordered">
  <thead>
    <tr><th>ID</th><th>Date</th><th>Brick</th><th>Qty</th><th>Worker ID</th></tr>
  </thead>
  <tbody>
    {% for r in rows %}
    <tr>
      <td>{{ r.id }}</td>
      <td>{{ r.prod_date }}</td>
      <td>{{ r.brick_item.name if r.brick_item }}</td>
      <td>{{ r.quantity }}</td>
      <td>{{ r.employee_id }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
